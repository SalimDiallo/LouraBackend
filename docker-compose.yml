  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: loura_celery_worker
  #   restart: unless-stopped
  #   command: celery -A lourabackend worker -l info
  #   environment:
  #     # Django Settings
  #     DEBUG: ${DEBUG:-False}
